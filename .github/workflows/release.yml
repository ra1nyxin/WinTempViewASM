name: Build release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize build log
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $log = "build\actions-build-log.md"
          $startedUtc = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffffffZ")
          $psInfo = $PSVersionTable | Out-String -Width 240
          $osInfo = Get-CimInstance Win32_OperatingSystem | Select-Object Caption,Version,BuildNumber,OSArchitecture,InstallDate,LastBootUpTime | Format-List | Out-String -Width 240
          $envInfo = Get-ChildItem Env: |
            Where-Object { $_.Name -notmatch '(?i)(token|secret|password|passwd|credential|private|key|auth)' } |
            Sort-Object Name |
            Format-Table -AutoSize |
            Out-String -Width 240
          @(
            '## Actions build log'
            ''
            '```text'
            "Workflow: $env:GITHUB_WORKFLOW"
            "Run ID: $env:GITHUB_RUN_ID"
            "Run number: $env:GITHUB_RUN_NUMBER"
            "Repository: $env:GITHUB_REPOSITORY"
            "Ref: $env:GITHUB_REF"
            "SHA: $env:GITHUB_SHA"
            'Runner label: windows-2022'
            'Checkout action: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5'
            "Runner OS: $env:RUNNER_OS"
            "Runner arch: $env:RUNNER_ARCH"
            "Runner name: $env:RUNNER_NAME"
            "Runner environment: $env:RUNNER_ENVIRONMENT"
            "Workspace: $env:GITHUB_WORKSPACE"
            "Started UTC: $startedUtc"
            '```'
            ''
            '## PowerShell'
            ''
            '```text'
            $psInfo
            '```'
            ''
            '## Operating system'
            ''
            '```text'
            $osInfo
            '```'
            ''
            '## Environment variables'
            ''
            'Sensitive environment variables matching token/secret/password/key/auth are filtered before writing public release notes.'
            ''
            '```text'
            $envInfo
            '```'
          ) | Set-Content -Path $log -Encoding utf8

      - name: Prepare MinGW-w64
        shell: pwsh
        run: |
          $log = "build\actions-build-log.md"
          @(
            ''
            '## Prepare MinGW-w64'
            ''
            '```text'
            'MinGW bin: C:\msys64\mingw64\bin'
          ) | Add-Content -Path $log -Encoding utf8
          $mingwBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$mingwBin\gcc.exe")) {
            "gcc.exe not found, installing mingw-w64-x86_64-gcc" | Tee-Object -FilePath $log -Append
            C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gcc" 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) {
              throw "pacman install failed with exit code $LASTEXITCODE"
            }
          } else {
            "gcc.exe already exists" | Tee-Object -FilePath $log -Append
          }
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "Added to GITHUB_PATH: $mingwBin" | Tee-Object -FilePath $log -Append
          "" | Add-Content -Path $log -Encoding utf8
          "gcc --version" | Tee-Object -FilePath $log -Append
          & "$mingwBin\gcc.exe" --version 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            throw "gcc --version failed with exit code $LASTEXITCODE"
          }
          "" | Add-Content -Path $log -Encoding utf8
          "windres --version" | Tee-Object -FilePath $log -Append
          & "$mingwBin\windres.exe" --version 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            throw "windres --version failed with exit code $LASTEXITCODE"
          }
          '```' | Add-Content -Path $log -Encoding utf8

      - name: Compute next release version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $log = "build\actions-build-log.md"
          @(
            ''
            '## Compute next release version'
            ''
            '```text'
            "gh release list --limit 100 --json tagName --jq '.[].tagName'"
          ) | Add-Content -Path $log -Encoding utf8
          $maxPatch = -1
          $tags = gh release list --limit 100 --json tagName --jq '.[].tagName'
          if ($LASTEXITCODE -ne 0) {
            throw "gh release list failed with exit code $LASTEXITCODE"
          }
          $tags | Tee-Object -FilePath $log -Append
          foreach ($tag in $tags) {
            if ($tag -match '^v0\.1\.(\d+)$') {
              $patch = [int]$Matches[1]
              if ($patch -gt $maxPatch) {
                $maxPatch = $patch
              }
            }
          }
          $nextPatch = $maxPatch + 1
          if ($nextPatch -lt 0) {
            $nextPatch = 0
          }
          $version = "v0.1.$nextPatch"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=WinTempViewASM $version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "Next release: $version" | Tee-Object -FilePath $log -Append
          '```' | Add-Content -Path $log -Encoding utf8

      - name: Build static optimized executable
        shell: pwsh
        run: |
          $log = "build\actions-build-log.md"
          @(
            ''
            '## Build static optimized executable'
            ''
            '```text'
            'cd src'
            'windres app.rc -O coff -o app.res.o'
            'cd ..'
            'gcc -O2 -s -static -static-libgcc -nostdlib -mwindows "-Wl,-e,WinMainCRTStartup" -o winTempView.exe src/main.S src/app.res.o -luser32 -lgdi32 -lkernel32'
            ''
          ) | Add-Content -Path $log -Encoding utf8
          Push-Location src
          windres app.rc -O coff -o app.res.o 2>&1 | Tee-Object -FilePath "..\build\actions-build-log.md" -Append
          if ($LASTEXITCODE -ne 0) {
            throw "windres failed with exit code $LASTEXITCODE"
          }
          Pop-Location
          gcc -O2 -s -static -static-libgcc -nostdlib -mwindows "-Wl,-e,WinMainCRTStartup" -o winTempView.exe src/main.S src/app.res.o -luser32 -lgdi32 -lkernel32 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            throw "gcc build failed with exit code $LASTEXITCODE"
          }
          if (-not (Test-Path "winTempView.exe")) {
            throw "winTempView.exe was not generated"
          }
          Get-Item winTempView.exe | Format-List Name,Length,LastWriteTime | Out-String -Width 240 | Tee-Object -FilePath $log -Append
          $sha256 = (Get-FileHash winTempView.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "SHA256: $sha256" | Tee-Object -FilePath $log -Append
          "Finished UTC: $((Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffffffZ"))" | Tee-Object -FilePath $log -Append
          '```' | Add-Content -Path $log -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
        run: |
          $buildLog = Get-Content "build\actions-build-log.md" -Raw
          $notes = @"
          Automated release for $env:VERSION from main commit $env:GITHUB_SHA.

          Build command:
          gcc -O2 -s -static -static-libgcc -nostdlib -mwindows "-Wl,-e,WinMainCRTStartup" -o winTempView.exe src/main.S src/app.res.o -luser32 -lgdi32 -lkernel32

          Asset:
          - winTempView.exe

          $buildLog
          "@
          $notes | Set-Content -Path "build\release-notes.md" -Encoding utf8
          gh release create $env:VERSION winTempView.exe --title "$env:RELEASE_NAME" --notes-file "build\release-notes.md" --target "$env:GITHUB_SHA"
